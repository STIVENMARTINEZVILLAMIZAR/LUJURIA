# Project-wide Gradle settings.
# IDE (e.g. Android Studio) users:
# Gradle settings configured through the IDE are ignored when building from the
# command line, check the build.gradle files instead (this file is intentionally
# left almost empty on purpose).
# For more details on how to configure your build environment visit
# https://www.gradle.org/configure-build-environment

# Enables namespacing of each library's R class so that its R class includes only the
# resources declared in the library itself and does nothing about resources coming from
# dependencies,
android.nonTransitiveRClass=true

# Version constants
minSdkVersion=24
targetSdkVersion=34
compileSdkVersion=34

# Firebase configuration
firebaseVersion=32.7.0
firebaseAuthVersion=22.3.0
firebaseAnalyticsVersion=21.5.0

# Kotlin configuration
kotlinVersion=1.9.20

# Other configurations
org.gradle.java.home=${JAVA_HOME}
